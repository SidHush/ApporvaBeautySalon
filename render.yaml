services:
  - type: web
    name: apoorva-hair-salon-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DATA_PATH
        value: /data/salon.json
    disk:
      name: salon-data
      mountPath: /data
      sizeGB: 1
